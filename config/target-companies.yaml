# Real target company configuration.
# This is the daily-use scan list.
#
# Run:
#   python -m job_radar scan --config config/target-companies.yaml --settings config/live-test-settings.yaml --report reports/target-scan.md --email-preview reports/target-email-preview.txt --send-email
#
# Source status:
#   greenhouse: supported now
#   lever: supported now
#   ashby: supported now
#   workday: supported now
#   usajobs: known source type, collector not implemented yet
#   html: known source type, collector not implemented yet
#
# Notes:
#   - Unsupported collector sources are included but disabled.
#   - Enable source blocks only after the collector exists.
#   - Voltage Park is represented through Lightning AI after the merger, so it is listed
#     but disabled to avoid duplicate coverage.

