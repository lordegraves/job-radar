  # ---------------------------------------------------------------------------
  # USAJobs sources - collector not implemented yet
  #
  # Federal filter rules:
  #   Allowed:
  #     - U.S. citizenship required
  #     - Public Trust
  #     - background investigation
  #     - suitability investigation
  #     - ability to obtain clearance
  #
  #   Review:
  #     - ability to obtain and maintain Secret clearance
  #
  #   Reject:
  #     - active/current Secret clearance required
  #     - Secret clearance required
  #     - Top Secret required
  #     - TS/SCI required
  #     - SCI required
  #     - polygraph required
  #     - existing federal employees only
  #     - status candidates only
  # ---------------------------------------------------------------------------

  - company_key: noaa
    name: NOAA
    source_type: usajobs
    source_slug: noaa
    enabled: false

  - company_key: nasa
    name: NASA
    source_type: usajobs
